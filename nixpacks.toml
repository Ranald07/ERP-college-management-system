[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd server && npm install --legacy-peer-deps",
  "cd client && npm install --legacy-peer-deps && npm install ajv@^8.11.0 --legacy-peer-deps"
]

[phases.build]
cmds = [
  "cd client && npm run build"
]

[start]
cmd = "node server/server.js"
